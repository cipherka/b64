<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.1/css/bootstrap.min.css">

    <link rel="shortcut icon" href="https://vimeworld.ru/favicon.ico">
    <title>Скачать изображение</title>
  </head>
  <body>
    <div class="container">
      <h1>Скачать изображение</h1>
      <img src="" id="image">
      <hr><a href="" class="btn btn-success" id="link" download="">Сохранить себе</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.1/js/bootstrap.min.js"></script>
    <script>
      function ready() {
        document.getElementById('image').src = `data:image/png;base64,${window.location.href.split('#')[1]}`;
        document.getElementById('link').href = `data:image/png;base64,${window.location.href.split('#')[1]}`;
      }

      document.addEventListener("DOMContentLoaded", ready);
    </script>
  </body>
</html>
